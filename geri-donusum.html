<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geri Dönüşüm Kutusu 🌍</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Baloo+2:wght@400;700;800&display=swap" rel="stylesheet">

<!-- Web App Icons -->
<link rel="icon" type="image/svg+xml" href="icon.svg">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2E7D32">
<meta name="description" content="Akıllı Geri Dönüşüm Kutusu - Eğlenerek Öğren">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html {
    scroll-behavior: auto;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(135deg, #0a1628 0%, #1a2845 100%);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .container {
    max-width: 900px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    text-align: center;
    padding: 30px 0 20px;
    animation: fadeDown 0.8s ease;
  }

  .earth-icon {
    font-size: 64px;
    display: block;
    animation: spin 8s linear infinite;
    margin-bottom: 10px;
  }

  @keyframes spin { 
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }

  header h1 {
    font-family: 'Baloo 2', cursive;
    font-size: clamp(28px, 6vw, 48px);
    font-weight: 800;
    background: linear-gradient(135deg, #4CAF50, #2196F3, #FF9800);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1.2;
  }

  header p {
    color: rgba(255,255,255,0.6);
    font-size: 16px;
    margin-top: 8px;
  }

  #mainMenu {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-top: 30px;
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .btn-card {
    border: none;
    border-radius: 24px;
    padding: 28px 20px;
    cursor: pointer;
    font-family: 'Baloo 2', cursive;
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 800;
    color: white;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    transition: transform 0.2s, box-shadow 0.2s;
  }

  .btn-card:hover { transform: translateY(-4px) scale(1.02); }
  .btn-card:active { transform: scale(0.97); }

  .btn-card .icon { font-size: clamp(36px, 7vw, 52px); }

  .cam-btn { background: linear-gradient(135deg, #1976D2, #42A5F5); box-shadow: 0 8px 30px rgba(33,150,243,0.4); }
  .kagit-btn { background: linear-gradient(135deg, #2E7D32, #66BB6A); box-shadow: 0 8px 30px rgba(76,175,80,0.4); }
  .metal-btn { background: linear-gradient(135deg, #424242, #BDBDBD); box-shadow: 0 8px 30px rgba(158,158,158,0.4); }
  .plastik-btn { background: linear-gradient(135deg, #E65100, #FFA726); box-shadow: 0 8px 30px rgba(255,152,0,0.4); }
  .pil-btn { background: linear-gradient(135deg, #B71C1C, #EF5350); box-shadow: 0 8px 30px rgba(244,67,54,0.4); grid-column: 1 / -1; }

  #confirmationPage {
    display: none;
    animation: fadeUp 0.5s ease;
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  #confirmationPage.active {
    display: flex;
  }

  .confirmation-card {
    border-radius: 28px;
    padding: 40px 30px;
    color: white;
    text-align: center;
    margin: auto;
    max-width: 500px;
    width: 100%;
  }

  .confirmation-icon {
    font-size: 80px;
    margin-bottom: 20px;
    animation: bounce 0.6s ease;
  }

  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  .confirmation-title {
    font-family: 'Baloo 2', cursive;
    font-size: 32px;
    font-weight: 800;
    margin-bottom: 12px;
    line-height: 1.2;
  }

  .confirmation-text {
    font-size: 18px;
    margin-bottom: 36px;
    line-height: 1.6;
    opacity: 0.95;
  }

  .button-group {
    display: flex;
    gap: 16px;
    justify-content: center;
  }

  .btn-yes, .btn-no {
    border: none;
    border-radius: 50px;
    padding: 16px 32px;
    font-family: 'Baloo 2', cursive;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.2s;
    flex: 1;
    max-width: 200px;
  }

  .btn-yes {
    background: #4CAF50;
    color: white;
    box-shadow: 0 6px 20px rgba(76,175,80,0.4);
  }

  .btn-no {
    background: rgba(255,255,255,0.2);
    color: white;
    border: 2px solid rgba(255,255,255,0.3);
  }

  .btn-yes:hover, .btn-no:hover { transform: scale(1.05); }

  #impactPage {
    display: none;
    animation: fadeUp 0.5s ease;
    scroll-behavior: auto;
  }

  #impactPage.active {
    display: block;
    scroll-behavior: auto;
  }

  #impactContent {
    scroll-margin-top: 0;
  }

  .back-btn {
    background: rgba(255,255,255,0.1);
    border: 2px solid rgba(255,255,255,0.2);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    margin-bottom: 24px;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    transition: all 0.2s;
  }

  .back-btn:hover { background: rgba(255,255,255,0.2); transform: translateX(-4px); }

  .impact-card {
    border-radius: 28px;
    padding: 40px;
    color: white;
    position: relative;
    overflow: hidden;
    min-height: 500px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    animation: fadeUp 0.5s ease;
  }

  .impact-header {
    display: flex;
    align-items: center;
    gap: 20px;
    margin-bottom: 32px;
  }

  .impact-icon { font-size: 72px; }

  .impact-title {
    font-family: 'Baloo 2', cursive;
    font-size: 36px;
    font-weight: 800;
    line-height: 1.1;
  }

  .impact-text {
    font-size: 18px;
    line-height: 1.8;
    margin-bottom: 32px;
    white-space: pre-line;
    opacity: 0.95;
  }

  .celebration {
    text-align: center;
    font-size: 72px;
    margin-bottom: 30px;
  }

  /* CANDY REWARD SYSTEM */
  .candy-section {
    margin-top: 30px;
    padding-top: 30px;
    border-top: 3px dashed rgba(255,255,255,0.3);
    text-align: center;
    animation: slideUp 0.6s ease 0.3s both;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .candy-message {
    font-family: 'Baloo 2', cursive;
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 20px;
    line-height: 1.5;
  }

  .candy-container {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
  }

  .candy-box {
    font-size: 60px;
    animation: shake 0.5s ease-in-out infinite;
    cursor: pointer;
    position: relative;
  }

  @keyframes shake {
    0%, 100% { transform: rotate(-5deg) translateX(0); }
    25% { transform: rotate(5deg) translateX(10px); }
    75% { transform: rotate(-5deg) translateX(-10px); }
  }

  .candy-arrow {
    font-size: 40px;
    animation: float 2s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateX(0) translateY(0); }
    50% { transform: translateX(10px) translateY(-5px); }
  }

  .candy-reward {
    font-size: 50px;
    animation: popIn 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55);
  }

  @keyframes popIn {
    0% { transform: scale(0) rotate(-180deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  .candy-text-reward {
    font-size: 16px;
    font-weight: 700;
    margin-top: 12px;
    opacity: 0.9;
  }

  /* SPEAK BUTTON */
  .speak-btn {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.4);
    color: white;
    padding: 12px 24px;
    border-radius: 50px;
    font-family: 'Baloo 2', cursive;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 24px;
    transition: all 0.2s;
  }

  .speak-btn:hover { background: rgba(255,255,255,0.3); transform: scale(1.05); }

  .speak-btn.speaking {
    background: rgba(255,255,255,0.4);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(255,255,255,0); }
  }

  /* AUDIO BUTTON STYLES */
  .audio-btn {
    background: rgba(255,255,255,0.2);
    border: 2px solid rgba(255,255,255,0.4);
    color: white;
    padding: 14px 28px;
    border-radius: 50px;
    font-family: 'Baloo 2', cursive;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
    transition: all 0.2s;
  }

  .audio-btn:hover { 
    background: rgba(255,255,255,0.3); 
    transform: scale(1.05);
  }

  .audio-btn.playing {
    background: rgba(255,255,255,0.4);
    animation: audioPulse 1s infinite;
  }

  @keyframes audioPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.4); }
    50% { box-shadow: 0 0 0 12px rgba(255,255,255,0); }
  }

  /* Hidden Audio Element */
  audio {
    display: none;
  }

  .cam-card { background: linear-gradient(145deg, #0D47A1, #1976D2); }
  .kagit-card { background: linear-gradient(145deg, #1B5E20, #388E3C); }
  .metal-card { background: linear-gradient(145deg, #212121, #616161); }
  .plastik-card { background: linear-gradient(145deg, #BF360C, #F57C00); }
  .pil-card { background: linear-gradient(145deg, #7F0000, #C62828); }

  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .credits {
    text-align: center;
    color: rgba(255,255,255,0.3);
    font-size: 12px;
    margin-top: 30px;
    padding-bottom: 20px;
  }

  @media (max-width: 480px) {
    #mainMenu { grid-template-columns: 1fr; }
    .pil-btn { grid-column: 1; }
    .impact-card { padding: 30px; min-height: 400px; }
    .impact-header { flex-direction: column; gap: 12px; }
    .button-group { flex-direction: column; }
    .btn-yes, .btn-no { max-width: 100%; }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <span class="earth-icon">🌍</span>
    <h1>Akıllı Geri Dönüşüm Kutusu</h1>
    <p>Seç, Onayla, Dünyaya Katkı Sağla! ♻️</p>
  </header>

  <div id="mainMenu">
    <button class="btn-card cam-btn" onclick="startConfirmation('cam')">
      <span class="icon">🫙</span> CAM
    </button>
    <button class="btn-card kagit-btn" onclick="startConfirmation('kagit')">
      <span class="icon">📄</span> KAĞIT
    </button>
    <button class="btn-card metal-btn" onclick="startConfirmation('metal')">
      <span class="icon">🥫</span> METAL
    </button>
    <button class="btn-card plastik-btn" onclick="startConfirmation('plastik')">
      <span class="icon">♻️</span> PLASTİK
    </button>
    <button class="btn-card pil-btn" onclick="startConfirmation('pil')">
      <span class="icon">🔋</span> PİL
    </button>
  </div>

  <div id="confirmationPage">
    <div id="confirmationContent"></div>
  </div>

  <div id="impactPage">
    <button class="back-btn" onclick="goToMain()">← Geri Dön</button>
    <div id="impactContent"></div>
  </div>

  <div class="credits" id="credits">
    6. Sınıf Sosyal Bilgiler Projesi • Geri Dönüşüm Eğitim Uygulaması
  </div>
</div>

<script>
const data = {
  cam: {
    icon: '🫙',
    title: 'CAM',
    açiklama: 'Camı geri dönüşüm kutusuna atabilir misin?',
    cardClass: 'cam-card',
    kısaImpact: '⚡ Bir cam şişe geri dönüştürüldüğünde 4 saat ampul yakacak enerji tasarruf edilir!\n\n♾️ Camı geri dönüşüme attığın için sonsuz kez yeniden kullanılabilecek bir malzemeyi kurtardın!\n\n💚 Bir cam şişeyi atıkla çöpe atmak yerine geri dönüşüme vermek, doğaya 1 milyon yıllık bir hediye!',
    candyBox: '🍬',
    candyReward: '🍭',
    candyMessage: 'Hadi! Kutunun sol kenarına bak... 👀',
    candyRewardText: 'TADıNDA BAŞARININ TADINI ÇIK! 🎉'
  },

  kagit: {
    icon: '📄',
    title: 'KAĞIT',
    açiklama: 'Kağıdı geri dönüşüm kutosuna atabilir misin?',
    cardClass: 'kagit-card',
    kısaImpact: '🌲 Kağıt attığın için 5 büyük ağacın kesilmesini engelledi!\n\n💧 Su tasarrufu sağladın — yeterince su 100 çiçek sulayabilir!\n\n💚 Ormanı koruduğun için kuşlar, sincaplar ve böceklerin yaşam alanını kurtardın!',
    candyBox: '🍬',
    candyReward: '🍬',
    candyMessage: 'Kutunun sol kenarına bak! İtfiyeci gibi çabuk! 🚒',
    candyRewardText: 'ORMANı KURTARDIN, ŞEKERİ KAZANDıN! 🌲✨'
  },

  metal: {
    icon: '🥫',
    title: 'METAL',
    açiklama: 'Metali geri dönüşüm kutosuna atabilir misin?',
    cardClass: 'metal-card',
    kısaImpact: '⚡ Alüminyum geri dönüşümü yeni üretimden 95 kat daha az enerji kullanır!\n\n♾️ Metal sonsuz kez geri dönüştürülebilir, hiç kayıp olmaz.\n\n💚 Maden ocaklarında kazı yapılmasını engelledi, dağları ve ormanları korudu!',
    candyBox: '🍬',
    candyReward: '🍫',
    candyMessage: 'Kutunun sol kenarında bunu hak ettin! 👉',
    candyRewardText: 'METAL GİBİ SAĞLAM KARARDINIZ! 💪🍫'
  },

  plastik: {
    icon: '♻️',
    title: 'PLASTİK',
    açiklama: 'Plastiği geri dönüşüm kutosuna atabilir misin?',
    cardClass: 'plastik-card',
    kısaImpact: '🐠 Plastik attığın için okyanuslara gitmesini engelledi, deniz hayvanlarını kurtardın!\n\n⏳ 400 yıl bozulmaz kalacak bu plastiği geri dönüşüme verdin — çok akıllıcaydı!\n\n💚 Deniz kaplumbağalarının ve balıkların yaşamını korudu!',
    candyBox: '🍬',
    candyReward: '🍬',
    candyMessage: 'Kutunun sol kenarına bak — deniz hayvanları teşekkür ediyor! 🐠',
    candyRewardText: 'OKYANUSu KURTARDIN, ŞEKERİ KAZANDIN! 🌊🍬'
  },

  pil: {
    icon: '🔋',
    title: 'PİL',
    açiklama: 'Pili geri dönüşüm kutosuna atabilir misin?',
    cardClass: 'pil-card',
    kısaImpact: '☠️ Pil atıkla çöpe atılırsa 1 m² toprağı 50 yıl zehirlerdi — sen bunu önledin!\n\n💧 İçme sularımızın kirletilmesini engelledi, insanlar ve hayvanlar sağlıklı kalacak.\n\n💚 Çocukların beyin gelişimini etkileyecek kurşun kirliliğinden korudu!',
    candyBox: '🍬',
    candyReward: '🍬',
    candyMessage: 'Kutunun sol kenarında seni bekliyorum! 👀✨',
    candyRewardText: 'EN AKILI KARAR! PİL GERİ DÖNÜŞÜMÜ ŞEKER DEĞERİNDE! ⚡🍬'
  }
};

function startConfirmation(type) {
  const d = data[type];
  document.getElementById('mainMenu').style.display = 'none';
  document.getElementById('credits').style.display = 'none';

  const confirmPage = document.getElementById('confirmationPage');
  confirmPage.classList.add('active');

  document.getElementById('confirmationContent').innerHTML = `
    <div class="confirmation-card ${d.cardClass}">
      <div class="confirmation-icon">${d.icon}</div>
      <div class="confirmation-title">${d.title} GERİ DÖNÜŞÜMÜ</div>
      <div class="confirmation-text">${d.açiklama}</div>
      <div class="button-group">
        <button class="btn-yes" onclick="showImpact('${type}')">✅ Evet, Attım!</button>
        <button class="btn-no" onclick="goToMain()">❌ Hayır</button>
      </div>
    </div>
  `;
}

function showImpact(type) {
  const d = data[type];
  document.getElementById('confirmationPage').classList.remove('active');
  const impactPage = document.getElementById('impactPage');
  impactPage.classList.add('active');

  document.getElementById('impactContent').innerHTML = `
    <div class="impact-card ${d.cardClass}">
      <button class="audio-btn" id="audioBtn" onclick="toggleAudio('${type}')">
        🔊 Sesi Dinle
      </button>

      <div class="impact-header">
        <span class="impact-icon">${d.icon}</span>
        <div class="impact-title">${d.title} KURTARDIN! 🎉</div>
      </div>
      <div class="impact-text">${d.kısaImpact}</div>
      <div class="celebration">✨ 💚 ✨</div>

      <div class="candy-section">
        <div class="candy-message">${d.candyMessage}</div>
        <div class="candy-container">
          <div class="candy-box" onclick="revealCandy(this, '${d.candyReward}', '${d.candyRewardText}')">${d.candyBox}</div>
          <div class="candy-arrow">👉</div>
        </div>
        <div id="candyRewardArea"></div>
      </div>
    </div>
  `;

  // Scroll to the back button (top of impactPage)
  setTimeout(() => {
    const backBtn = document.querySelector('.back-btn');
    if (backBtn) {
      backBtn.scrollIntoView({ behavior: 'auto', block: 'start' });
    }
  }, 10);
}

let currentAudio = null;

function toggleAudio(type) {
  const audioBtn = document.getElementById('audioBtn');
  const audioPath = `audio/${type}.mp3`;
  
  // Eğer ses oynuyorsa, durdur
  if (currentAudio && !currentAudio.paused) {
    currentAudio.pause();
    currentAudio.currentTime = 0;
    if (audioBtn) {
      audioBtn.textContent = '🔊 Sesi Dinle';
      audioBtn.classList.remove('playing');
    }
    return;
  }
  
  // Yeni ses oluştur ve oynat
  if (currentAudio) {
    currentAudio.pause();
  }
  
  currentAudio = new Audio(audioPath);
  
  if (audioBtn) {
    audioBtn.textContent = '⏸ Durdur';
    audioBtn.classList.add('playing');
  }
  
  currentAudio.onended = () => {
    if (audioBtn) {
      audioBtn.textContent = '🔊 Tekrar Dinle';
      audioBtn.classList.remove('playing');
    }
  };
  
  currentAudio.onerror = () => {
    console.error('Ses dosyası bulunamadı: ' + audioPath);
    if (audioBtn) {
      audioBtn.textContent = '❌ Ses Yüklenemedi';
      audioBtn.classList.remove('playing');
    }
  };
  
  currentAudio.play().catch(err => {
    console.error('Ses oynatma hatası:', err);
    if (audioBtn) {
      audioBtn.textContent = '❌ Hatası Oluştu';
      audioBtn.classList.remove('playing');
    }
  });
}

function revealCandy(box, reward, text) {
  const rewardArea = document.getElementById('candyRewardArea');
  if (rewardArea.innerHTML === '') {
    rewardArea.innerHTML = `
      <div class="candy-reward">${reward}</div>
      <div class="candy-text-reward">${text}</div>
    `;
    box.style.opacity = '0.5';
  }
}

function goToMain() {
  // Tüm sayfaları gizle
  document.getElementById('confirmationPage').classList.remove('active');
  document.getElementById('impactPage').classList.remove('active');
  
  // İçerikleri temizle
  document.getElementById('confirmationContent').innerHTML = '';
  document.getElementById('impactContent').innerHTML = '';
  
  // Ana menüyü göster
  document.getElementById('mainMenu').style.display = 'grid';
  document.getElementById('credits').style.display = 'block';
  
  // Sayfayı en üste scroll et
  window.scrollTo(0, 0);
  document.body.scrollTop = 0;
  document.documentElement.scrollTop = 0;
}
</script>
</body>
</html>
